<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿para la más guapa de la uni? ❤️</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
        }

        #meme-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .buttons {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        #btn-si {
            background-color: #28a745;
            color: white;
        }

        #btn-no {
            background-color: #dc3545;
            color: white;
        }

        /* Clase para el éxito */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <img id="meme-img" src="https://media.tenor.com/ICV9YshfS_AAAAAi/cat-puss-in-boots.gif" alt="Meme triste">
        <h1 id="pregunta">¿QUIERES SALIR CONMIGO?</h1>
        
        <div class="buttons">
            <button id="btn-si">Sí</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <div class="container hidden" id="success-message">
        <img src="https://media.tenor.com/u_pW-zB0yCAAAAAi/cat-love.gif" alt="Meme feliz" style="width: 300px; border-radius: 15px;">
        <h1 style="color: #d63384;">¡Sabía que dirías que sí! ❤️</h1>
        <p>Prepara tus cosas, ¡nos vemos el 14! 😍</p>
    </div>

    <script>
        const btnSi = document.getElementById('btn-si');
        const btnNo = document.getElementById('btn-no');
        const memeImg = document.getElementById('meme-img');
        const mainCard = document.getElementById('main-card');
        const successMessage = document.getElementById('success-message');
        const pregunta = document.getElementById('pregunta');

        let siFontSize = 1.2; // Tamaño inicial en rem
        let noClickCount = 0;

        const frasesNo = [
            "¿Segura que no quieres?",
            "Piénsalo bien...",
            "Pero te voy a ver a tu casa :c",
            "Entiendo, es tu decisión :c",
            "No te arrepentirás, ¡lo juro!",
            "¡Solo dale a SÍ!",
            "¿Con quién vas a salir? 🤨",
            "Voy a llorar...",
            "Ya ni me hables."
        ];

        const memesTristes = [
            "https://media.tenor.com/Y5V97G6O7m0AAAAi/sad-cat.gif",
            "https://media.tenor.com/0v8XoW9n3pIAAAAi/cat-sad.gif",
            "https://media.tenor.com/zS_T6Yq6_m0AAAAi/crying-cat.gif"
        ];

        btnNo.addEventListener('click', () => {
            // Aumentar tamaño del botón SÍ
            siFontSize += 2; 
            btnSi.style.fontSize = siFontSize + "rem";
            btnSi.style.padding = (siFontSize * 10) + "px " + (siFontSize * 20) + "px";

            // Cambiar texto del botón NO
            if (noClickCount < frasesNo.length) {
                btnNo.innerText = frasesNo[noClickCount];
                // Cambiar meme aleatoriamente
                memeImg.src = memesTristes[Math.floor(Math.random() * memesTristes.length)];
            } else {
                btnNo.innerText = "Ya no tienes opción 😎";
                btnNo.style.display = "none"; // Desaparece el botón No después de mucho
            }

            noClickCount++;
        });

        btnSi.addEventListener('click', () => {
            mainCard.classList.add('hidden');
            successMessage.classList.remove('hidden');
        });
    </script>
</body>
</html>
